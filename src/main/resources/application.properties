# ===============================
# DATABASE CONNECTION
# ===============================
# Replace 'healthcare_db' with your actual database name
spring.datasource.url=jdbc:mysql://localhost:3306/healthcare?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Reda@reda55
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
# 'none' because Flyway handles the schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# FLYWAY MIGRATIONS
# ===============================
# This ensures Flyway runs your V1__init.sql on startup
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===============================
# JACKSON / JSON
# ===============================
# Formats dates properly for your Appointment and MedicalFile entities
spring.jackson.date-format=yyyy-MM-dd
# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
server.error.include-message=always