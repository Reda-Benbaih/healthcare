name: HealthCare+ CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: healthcare
          MYSQL_ROOT_PASSWORD: Reda@reda55
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -p123456789"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration de Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven' # Optimisation : met en cache les dépendances téléchargées

    - name: Compilation et exécution des tests
      run: mvn clean verify
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/healthcare?createDatabaseIfNotExist=true&serverTimezone=UTC
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: Reda@reda55
        SPRING_DATA_REDIS_HOST: localhost
        SPRING_DATA_REDIS_PORT: 6379
